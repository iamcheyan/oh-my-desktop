force_keyboard_focus = true                                                 # forces keyboard forcus to stay in Walker
selection_wrap = true                                                       # wrap list if at bottom or top
theme = "omd"                                                               # theme to use
additional_theme_location = "~/.config/omarchy/walker/themes/"
hide_action_hints = false                                                   # globally hide the action hints

[placeholders]
"default" = { input = " Search...", list = "No Results" } # placeholders for input and empty list, key is the providers name, so f.e. "desktopapplications" or "menus:other"
"desktopapplications" = { input = "Search apps...", list = "No Applications" }
"clipboard" = { input = "Search clipboard history...", list = "Clipboard is empty" }
"files" = { input = "Search files...", list = "No Files" }
"symbols" = { input = "Search symbols...", list = "No Symbols" }
"calc" = { input = "Calculate...", list = "No Result" }

[keybinds]
quick_activate = []

[columns]
symbols = 1 # providers to be queried by default

[providers]
max_results = 256 # 256 should be enough for everyone
default = [
  "desktopapplications",
  "websearch",
]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = ":"
provider = "symbols"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"

[[emergencies]]
text = "Restart Walker"
command = "omarchy-restart-walker"
